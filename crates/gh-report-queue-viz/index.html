<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gh-report queue network</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 1.5rem;
      }
      .queue-viz {
        max-width: 900px;
        margin: 0 auto;
      }
      .row {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin: 0.75rem 0;
        flex-wrap: wrap;
      }
      .trigger {
        flex: 1;
        min-width: 12rem;
        padding: 0.5rem 0.8rem;
        border-radius: 0.4rem;
        font-size: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }
      .trigger.scheduled {
        background: #1d4ed8;
      }
      .trigger.webhook {
        background: #15803d;
      }
      .trigger.warmstart {
        background: #475569;
      }
      .split-label {
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #94a3b8;
        margin: 1.25rem 0 0.4rem;
        border-bottom: 1px solid #334155;
        padding-bottom: 0.2rem;
      }
      .pipeline {
        position: relative;
        display: flex;
        justify-content: space-between;
        gap: 0.4rem;
        margin: 1rem 0;
      }
      .stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 3.2rem;
        padding: 0.4rem 0.3rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-align: center;
        color: #e2e8f0;
        position: relative;
        z-index: 1;
      }
      .stage-note {
        font-size: 0.6rem;
        font-weight: 400;
        color: #94a3b8;
        margin-top: 0.15rem;
      }
      .stage-work {
        background: #334155;
        border: 2px solid #64748b;
        border-radius: 0.35rem;
        animation: work-pulse 1.6s ease-in-out infinite;
      }
      .stage-store {
        background: #1e3a5f;
        border: 2px solid #3b82f6;
        border-radius: 45% / 18%;
      }
      @keyframes work-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 rgba(100, 116, 139, 0);
        }
        50% {
          box-shadow: 0 0 0.5rem rgba(100, 116, 139, 0.85);
        }
      }
      .lane {
        position: relative;
        flex: 1;
        min-height: 2.5rem;
        background: #1e293b;
        border-radius: 0.4rem;
        overflow: hidden;
      }
      .lane-transit {
        position: absolute;
        inset: 0;
        background: transparent;
        border-radius: 0;
        overflow: visible;
        pointer-events: none;
        z-index: 2;
      }
      .packet {
        position: absolute;
        top: 50%;
        left: var(--transit-start, 0%);
        width: 0.8rem;
        height: 0.8rem;
        margin-top: -0.4rem;
        border-radius: 999px;
        animation-name: transit-move;
        animation-timing-function: linear;
        animation-fill-mode: forwards;
      }
      @keyframes transit-move {
        from {
          left: var(--transit-start, 0%);
          opacity: 1;
        }
        to {
          left: var(--transit-end, 100%);
          opacity: 0.85;
        }
      }
      .packet-dropped {
        opacity: 0.35;
        outline: 2px solid #ef4444;
      }
      .packet-deduplicated {
        opacity: 0.35;
        outline: 2px dashed #f59e0b;
      }
      .packet-failure {
        outline: 2px solid #ef4444;
      }
      .packet-success {
        outline: 2px solid #22c55e33;
      }
      .packet-page-update {
        outline: 2px solid #f59e0b;
        width: 1.1rem;
        height: 1.1rem;
        margin-top: -0.55rem;
      }
      .gauge {
        font-variant-numeric: tabular-nums;
        font-size: 0.9rem;
        background: #1e293b;
        padding: 0.3rem 0.6rem;
        border-radius: 0.4rem;
      }
      button {
        background: #334155;
        color: #e2e8f0;
        border: none;
        border-radius: 0.3rem;
        padding: 0.3rem 0.6rem;
        cursor: pointer;
      }
      button:hover {
        background: #475569;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./bootstrap.js"></script>
  </body>
</html>
