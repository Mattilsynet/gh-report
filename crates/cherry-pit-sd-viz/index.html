<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gh-report queue network</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 1.5rem;
      }
      .queue-viz {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
      }
      .scene-viz {
        width: 100%;
        margin: 1rem 0;
      }
      .scene-svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .scene-belt {
        fill: none;
        stroke: #475569;
        stroke-width: 2;
      }
      .scene-item {
        stroke: #0f172a;
        stroke-width: 1;
      }
      .scene-queue-fill {
        fill: #3b82f6;
        fill-opacity: 0.35;
        pointer-events: none;
      }
      .scene-node {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0.4rem;
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        border-radius: 0.4rem;
      }
      .scene-node-stock.scene-node-standard {
        background: #334155;
        border: 2px solid #64748b;
      }
      .scene-node-stock.scene-node-bounded {
        background: #1e3a5f;
        border: 2px solid #3b82f6;
      }
      .scene-node-stock.scene-node-accumulator {
        background: #1e293b;
        border: 2px solid #94a3b8;
      }
      .scene-node-stock.scene-node-monotonic {
        background: #14532d;
        border: 2px solid #22c55e;
      }
      .scene-node-converter {
        background: #422006;
        border: 2px solid #f59e0b;
      }
      .scene-node-cloud {
        background: #1e293b;
        border: 2px dashed #94a3b8;
        border-radius: 50%;
      }
      .scene-node-cloud.scene-node-source {
        border-color: #22c55e;
      }
      .scene-node-cloud.scene-node-sink {
        border-color: #6366f1;
      }
      .row {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin: 0.75rem 0;
        flex-wrap: wrap;
      }
      .row.legend {
        font-size: 0.85rem;
      }
      .gauge {
        font-variant-numeric: tabular-nums;
        font-size: 0.9rem;
        background: #1e293b;
        padding: 0.3rem 0.6rem;
        border-radius: 0.4rem;
      }
      button {
        background: #334155;
        color: #e2e8f0;
        border: none;
        border-radius: 0.3rem;
        padding: 0.3rem 0.6rem;
        cursor: pointer;
      }
      button:hover {
        background: #475569;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./bootstrap.js"></script>
  </body>
</html>
