[package]
name = "pardosa"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "EDA storage layer implementing fiber semantics"
license.workspace = true

[lib]
name = "pardosa"
path = "src/lib.rs"

[features]
# Exposes `Dragline::from_raw_parts` as `pub` so integration tests in
# `tests/` can drive tamper-injection scenarios without needing a production
# persistence layer. The function is the documented persistence-boundary
# seam (`load_from_disk` future surface); this feature flag lets integration
# tests use it ahead of that landing without changing the public API surface
# under normal compilation.
test-support = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
# F2c (PAR-0021 R1+R3): canonical-bytes domain locked to GEN-0035 in-house
# encoding. `blake3` feature pulls the `precursor_hash_of` / `frontier_roll`
# helpers; the `blake3` crate dep stays contained to `pardosa-encoding` so
# pardosa runtime does not consume `pardosa-derive` (PAR-0024 R5).
# Hand-rolled `impl Encode` on Index/DomainId/Event<T> lives in `src/event.rs`.
pardosa-encoding = { path = "../pardosa-encoding", features = ["blake3"] }
# F2e (PAR-0021 R4): frontier publish requires BLAKE3 chaining directly in
# pardosa (frontier_roll = BLAKE3(frontier || event_bytes)). Matches the dep
# already present transitively via pardosa-encoding[blake3].
blake3 = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
# Mission M4 criterion bench harness. dev-dep only.
criterion = { workspace = true }

[[bench]]
name = "dragline"
harness = false
