name: Reusable CI

on:
  workflow_call:

# Third-party actions are pinned by full commit SHA, not floating tag,
# to mitigate supply-chain compromise of the action publisher
# (per kerkour.com/rust-supply-chain-nightmare and AGENTS.md). The
# trailing `# v<tag>` comment is human-readable provenance; Dependabot
# (.github/dependabot.yml) keeps the SHAs current.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-test-lint:
    name: build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --all-features --locked
      # CHE-0087 R5/R6: the Leptos CSR client is wasm32-only and excluded from
      # the default build set. Its committed .wasm/.js artefacts are embedded
      # into gh-report via include_bytes!/include_str!; this step compiles the
      # crate for its real target every CI run so source drift from the
      # committed artefact cannot pass unnoticed.
      - run: cargo build -p gh-report-web-client --target wasm32-unknown-unknown --release --locked
      # Regen-diff gate (adr-fmt-p5tnh / adr-fmt-xgcnn): the committed
      # gh-report-web-client.js/_bg.wasm pair must be regenerable from the
      # crate's own wasm32 build with matching import keys, or Leptos never
      # mounts client-side (WebAssembly.instantiate throws, silent — no
      # server error, no CSP violation). This does NOT byte-diff the
      # _bg.wasm: wasm-bindgen's emitted wasm bytes are not reproducible
      # across build hosts even at an identical pinned wasm-bindgen version,
      # so a wasm byte-diff here would false-positive on every CI run. The
      # .js glue IS deterministic text, so a text diff on it is a robust
      # drift detector; the import-key invariant assertion below is the
      # part that actually proves the *committed* pair links, independent
      # of any host-specific wasm bytes.
      - name: gh-report-web-client wasm/js regen-diff gate
        if: always()
        run: |
          set -euo pipefail
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          regen_dir="$(mktemp -d)/regen"
          wasm-bindgen --target web --out-name gh-report-web-client \
            --out-dir "$regen_dir" \
            target/wasm32-unknown-unknown/release/gh_report_web_client.wasm
          committed_js=crates/gh-report/templates/gh-report-web-client.js
          committed_wasm=crates/gh-report/templates/gh-report-web-client_bg.wasm
          if ! git diff --no-index --exit-code "$committed_js" "$regen_dir/gh-report-web-client.js"; then
            echo "::error::committed $committed_js is stale relative to the crate's own wasm32 build. Regenerate with: cargo build --release --target wasm32-unknown-unknown -p gh-report-web-client --locked && wasm-bindgen --target web --out-name gh-report-web-client --out-dir crates/gh-report/templates target/wasm32-unknown-unknown/release/gh_report_web_client.wasm"
            exit 1
          fi
          js_key=$(grep -o '"\./gh-report-web-client_bg\.js"' "$committed_js" | head -1)
          wasm_import=$(strings "$committed_wasm" | grep -o '^\./gh-report-web-client_bg\.js$' | head -1)
          if [ -z "$js_key" ] || [ -z "$wasm_import" ] || [ "$js_key" != "\"$wasm_import\"" ]; then
            echo "::error::import-key mismatch: committed $committed_js provides import key ${js_key:-<none found>} but committed $committed_wasm expects import module ${wasm_import:-<none found>}. WebAssembly.instantiate() will throw and Leptos never mounts (adr-fmt-xgcnn). Regenerate the pair as a matched set with: cargo build --release --target wasm32-unknown-unknown -p gh-report-web-client --locked && wasm-bindgen --target web --out-name gh-report-web-client --out-dir crates/gh-report/templates target/wasm32-unknown-unknown/release/gh_report_web_client.wasm"
            exit 1
          fi
          echo "regen-diff gate: js glue matches fresh regen; import key ${js_key} matches wasm's expected import module ${wasm_import}"
      # Lint the wasm-only crate on its real target so dom.rs (cfg(wasm32))
      # is clippy-checked, not merely compiled (CHE-0087 R6).
      - run: cargo clippy -p gh-report-web-client --target wasm32-unknown-unknown --all-targets --locked -- -D warnings
        if: always()
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
        if: always()
      - run: cargo fmt --check
        if: always()
      # Tripwire: deny `async-trait` (direct or transitive) in every cherry-pit-*
      # crate's resolved feature-aware dep tree. Locks in CHE-0025 (port traits
      # use RPITIT, not `#[async_trait]` macro) and CHE-0029:R4 (forbidden-dep
      # budget for cherry-pit-core, extended workspace-wide for the cherry-pit-*
      # family as the architectural floor). Authored in mission
      # phase2-v2-track-1 SM-1 (bd: adr-fmt-6bua). Audit artefact:
      # .ooda/track-1-4-rpitit-audit-*.md.
      - name: deny async-trait in cherry-pit-* dep trees
        if: always()
        run: |
          set -euo pipefail
          fail=0
          for c in cherry-pit-core cherry-pit-gateway cherry-pit-web cherry-pit-agent \
                   cherry-pit-projection cherry-pit-wq cherry-pit-storage; do
            if cargo tree -p "$c" -e features 2>&1 | grep -q async-trait; then
              echo "::error::$c transitively depends on async-trait (CHE-0025/CHE-0029:R4)"
              fail=1
            fi
          done
          exit $fail
      # The pardosa-nats live-test harness (crates/pardosa-nats/src/test_support.rs)
      # spawns a real `nats-server` and asserts its --version matches the pin in
      # tools/.nats-server-version. Install exactly that version, checksum-verified
      # against the upstream SHA256SUMS, onto PATH before the test run.
      - name: install pinned nats-server
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < tools/.nats-server-version)"
          asset="nats-server-v${version}-linux-amd64"
          base="https://github.com/nats-io/nats-server/releases/download/v${version}"
          curl -fsSL -o "${asset}.tar.gz" "${base}/${asset}.tar.gz"
          curl -fsSL -o SHA256SUMS "${base}/SHA256SUMS"
          grep "${asset}.tar.gz" SHA256SUMS | sha256sum -c -
          tar -xzf "${asset}.tar.gz"
          install -m 0755 "${asset}/nats-server" /usr/local/bin/nats-server
          nats-server --version | grep -F "v${version}"
      - run: cargo test --workspace --all-features --locked
        if: always()

  # Tripwire: pin the `projection_state` mutex chokepoint in gh-report.
  # Per `crates/gh-report/src/app/state.rs:300-316`, `AppState::lock_projection()`
  # is the sole sanctioned accessor for the `EvidenceProjection` mutex
  # (CHE-0048:R2 sole-writer rule; "never hold the returned MutexGuard
  # across an .await" — D-CD-3). Raw `.projection_state.lock(` calls
  # must therefore appear only inside `crates/gh-report/src/app/state.rs`
  # (the accessor definition site and the boot-time `bootstrap_replay_state`
  # which uses tight-scope guards intentionally).
  #
  # Scope: gh-report only. NOT a workspace-wide `std::sync::Mutex` ban —
  # `crates/gh-report/src/infra/server/state.rs` ArcSwap/broadcast patterns
  # and the `Arc<Mutex<HashMap<...>>>` routing/`next_seq` caches
  # (CHE-0054:R5/R6) are untouched. The await-holding contract is
  # additionally enforced by `clippy::await_holding_lock` (clippy pedantic
  # group, denied by `RUSTFLAGS: -D warnings`).
  projection-lock-tripwire:
    name: gh-report projection-lock chokepoint (CHE-0048:R2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: pin .projection_state.lock( to app/state.rs
        run: |
          set -euo pipefail
          offenders=$(grep -RIn --include='*.rs' -E '\.projection_state\.lock\(' \
            crates/gh-report/src \
            | grep -v '^crates/gh-report/src/app/state.rs:' || true)
          if [ -n "$offenders" ]; then
            echo "::error::raw .projection_state.lock( outside crates/gh-report/src/app/state.rs"
            echo "::error::use AppState::lock_projection() (state.rs:300-316); CHE-0048:R2 chokepoint"
            echo "$offenders"
            exit 1
          fi

  # Hard gate: every public library `pub enum` deriving `thiserror::Error`
  # must carry `#[non_exhaustive]` (PGN-0006, CHE-0021), enforced by the
  # `non-exhaustive-check` crate (RST-0006). The tool is deliberately
  # conservative — under-flagging (missing a macro-generated enum) is the
  # safe failure mode; over-flagging is not, so any real hit here is
  # treated as authoritative rather than advisory.
  non-exhaustive-check:
    name: non-exhaustive error-enum gate (RST-0006, PGN-0006, CHE-0021)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: run non-exhaustive-check against the workspace root
        run: |
          set -euo pipefail
          if ! cargo run -p non-exhaustive-check --quiet -- "$(pwd)"; then
            echo "::error::missing #[non_exhaustive] on a library error enum (RST-0006, PGN-0006, CHE-0021)"
            exit 1
          fi

  supply-chain:
    name: supply-chain (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install --locked cargo-audit
      - run: cargo audit
      - run: cargo install --locked cargo-deny
        if: always()
      - run: cargo deny check
        if: always()
