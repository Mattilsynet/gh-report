name: Build

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Adapted from Mattilsynet/rust-ci-conf/.github/workflows/upload.yaml.

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci-reusable.yml

  build:
    name: Build and push to GAR
    needs: ci
    runs-on: ubuntu-latest

    env:
      GAR_LOCATION: europe-north1
      ARTIFACT_ID: artifacts-352708
      IMAGE: europe-north1-docker.pkg.dev/artifacts-352708/${{ vars.ARTIFACT_REPO_ID }}/${{ github.event.repository.name }}

    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - id: auth-gar
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: access_token
          create_credentials_file: true
          workload_identity_provider: projects/799884623953/locations/global/workloadIdentityPools/gh-actions/providers/github
          service_account: artifacts-wi-sa-github-actions@${{ env.ARTIFACT_ID }}.iam.gserviceaccount.com

      - name: Login to GAR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth-gar.outputs.access_token }}

      - id: build-push
        name: Build and push docker image to GAR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: crates/gh-report/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth-deploy
        name: Authenticate to Google Cloud (deploy)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/75951934649/locations/global/workloadIdentityPools/gh-actions/providers/github
          service_account: cloudrun-wi-sa-github-actions@ghreport-d302.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Deploy to Cloud Run by digest
        run: |
          gcloud run services update ghreport \
            --region europe-north1 \
            --project ghreport-d302 \
            --image "europe-north1-docker.pkg.dev/artifacts-352708/${{ vars.ARTIFACT_REPO_ID }}/${{ github.event.repository.name }}@${{ needs.build.outputs.digest }}"
