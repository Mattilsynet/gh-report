name: Build

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Adapted from Mattilsynet/rust-ci-conf/.github/workflows/upload.yaml.

jobs:
  upload:
    name: Upload to GAR
    runs-on: ubuntu-latest

    env:
      GAR_LOCATION: europe-north1
      ARTIFACT_ID: artifacts-352708
      IMAGE: europe-north1-docker.pkg.dev/artifacts-352708/${{ vars.ARTIFACT_REPO_ID }}/${{ github.event.repository.name }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - id: auth-gar
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          create_credentials_file: true
          workload_identity_provider: projects/799884623953/locations/global/workloadIdentityPools/gh-actions/providers/github
          service_account: artifacts-wi-sa-github-actions@${{ env.ARTIFACT_ID }}.iam.gserviceaccount.com

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth-gar.outputs.access_token }}

      - name: Build and push docker image to GAR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/gh-report/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
