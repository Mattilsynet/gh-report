name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Third-party actions are pinned by full commit SHA, not floating tag,
# to mitigate supply-chain compromise of the action publisher
# (per kerkour.com/rust-supply-chain-nightmare and AGENTS.md). The
# trailing `# v<tag>` comment is human-readable provenance; Dependabot
# (.github/dependabot.yml) keeps the SHAs current.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --all-features

  # Tripwire: deny `async-trait` (direct or transitive) in every cherry-pit-*
  # crate's resolved feature-aware dep tree. Locks in CHE-0025 (port traits
  # use RPITIT, not `#[async_trait]` macro) and CHE-0029:R4 (forbidden-dep
  # budget for cherry-pit-core, extended workspace-wide for the cherry-pit-*
  # family as the architectural floor). Authored in mission
  # phase2-v2-track-1 SM-1 (bd: adr-fmt-6bua). Audit artefact:
  # .ooda/track-1-4-rpitit-audit-*.md.
  async-trait-tripwire:
    name: async-trait tripwire (CHE-0025, CHE-0029:R4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: deny async-trait in cherry-pit-* dep trees
        run: |
          set -euo pipefail
          fail=0
          for c in cherry-pit-core cherry-pit-gateway cherry-pit-web cherry-pit-agent \
                   cherry-pit-projection cherry-pit-wq cherry-pit-storage \
                   cherry-pit-pardosa; do
            if cargo tree -p "$c" -e features 2>&1 | grep -q async-trait; then
              echo "::error::$c transitively depends on async-trait (CHE-0025/CHE-0029:R4)"
              fail=1
            fi
          done
          exit $fail

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --check

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install --locked cargo-audit
      - run: cargo audit

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install --locked cargo-deny
      - run: cargo deny check

  # cargo-vet runs advisory-only for now (continue-on-error). Goal is to
  # surface the unvetted-dep list and chip down `supply-chain/config.toml`
  # exemptions over time via `cargo vet certify`. Flip continue-on-error
  # off once the exemption count is "manageable" (judgement call;
  # rough heuristic <= 50 exemptions).
  # See: kerkour.com/rust-supply-chain-nightmare
  vet:
    name: vet (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install --locked cargo-vet
      - run: cargo vet --locked
