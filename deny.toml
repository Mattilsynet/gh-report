[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    # BSL-1.0: xxhash-rust (transitive via zstd via cherry-pit-storage).
    # Boost Software License 1.0, OSI-approved, permissive — equivalent
    # in posture to MIT/BSD. Allowed for the same reason as ISC.
    "BSL-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal `path = "../foo"` deps are wildcards by default
# because they carry no version constraint. We're an unpublished
# workspace; treat intra-workspace path deps as out of scope for the
# wildcard ban. External wildcards remain denied.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
