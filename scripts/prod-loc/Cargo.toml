[package]
name = "prod-loc"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "Apache-2.0 OR MIT"
publish = false
description = "Count Rust production lines, excluding #[cfg(test)] modules and tests/ directories."

# Standalone crate; excluded from the parent workspace so its lints / deps
# do not bleed into the gh-report mission. Invoke from repo root via:
#   cargo run --manifest-path scripts/prod-loc/Cargo.toml -- <PATH>
[workspace]

[[bin]]
name = "prod-loc"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
syn = { version = "2.0.117", features = ["full", "extra-traits"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
walkdir = "2.5"
